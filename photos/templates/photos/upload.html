{% extends 'photos/base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">📤 Массовая загрузка фото</h2>

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label for="category" class="form-label">Выбери категорию</label>
            <select name="category" id="category" class="form-select" required>
                <option value="">— выбери —</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="subcategory" class="form-label">Подкатегория (необязательно)</label>
            <select name="subcategory" id="subcategory" class="form-select">
                <option value="">— без подкатегории —</option>
                {% for cat in categories %}
                {% for sub in cat.subcategories.all %}
                <option value="{{ sub.id }}">{{ cat.name }} → {{ sub.name }}</option>
                {% endfor %}
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Выбери фото (можно сразу много)</label>
            <div id="drop-zone" style="border: 2px dashed #555; border-radius: 12px; padding: 40px 20px;
                 text-align: center; cursor: pointer; transition: border-color 0.3s; background: #111;">
                <p class="mb-2" style="color: #aaa;">📁 Перетащи фото сюда</p>
                <p class="small mb-0" style="color: #666;">или нажми, чтобы выбрать</p>
                <input type="file" name="images" id="images" class="d-none"
                       accept="image/*" multiple required>
            </div>
            <div id="file-list" class="mt-2 small" style="color: #666;"></div>
        </div>

        <button type="submit" class="btn btn-light w-100">Загрузить</button>
    </form>

    <a href="{% url 'admin:index' %}" class="btn btn-outline-light mt-3">← В админку</a>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('images');
    const fileList = document.getElementById('file-list');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#fff';
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#555';
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#555';
        fileInput.files = e.dataTransfer.files;
        updateFileList(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', () => {
        updateFileList(Array.from(fileInput.files));
    });

    function updateFileList(files) {
        if (files.length === 0) {
            fileList.textContent = '';
        } else {
            fileList.textContent = 'Выбрано ' + files.length + ' файлов: '
                + files.map(f => f.name).join(', ');
        }
    }
</script>
{% endblock %}
