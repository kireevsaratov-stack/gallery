{% extends 'gallery/base.html' %}

{% block content %}
<div class="container">
    <div class="category-header">
        <ul class="breadcrumb" style="justify-content: center; margin-bottom: 16px;">
            <li><a href="{% url 'home' %}">Главная</a></li>
            <li>{{ category.name }}</li>
        </ul>
        <h1>{{ category.name }}</h1>
        <div class="count">{{ photos.count }} фото</div>
    </div>
</div>

{% if photos %}
<div class="photo-grid">
    {% for photo in photos %}
    <div class="photo-item">
        <img src="{{ photo.image.url }}" alt="{{ photo.title }}" loading="lazy">
    </div>
    {% endfor %}
</div>
{% else %}
<p style="text-align: center; padding: 60px 0; color: var(--text-muted);">
    В этой категории пока нет фото.
</p>
{% endif %}
{% endblock %}
